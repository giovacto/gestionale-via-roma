<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso Gestionale - Via Roma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            max-width: 450px;
            width: 100%;
            border: none;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <div class="container p-3">
        <div class="card login-card shadow-lg mx-auto p-4 bg-white">
            <div class="text-center mb-4">
                <h1 class="h3 mb-1 fw-bold text-secondary">Calzature Via Roma</h1>
                <p class="text-muted">Inserisci le credenziali per accedere alla plancia</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} text-center fw-bold small py-2" role="alert">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome Utente</label>
                    <input type="text" name="username" class="form-control form-control-lg text-center"
                        placeholder="es. admin" required autocomplete="off">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg text-center"
                        placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-dark btn-touch btn-lg w-100 py-3 fw-bold text-uppercase">🔓 ENTRA
                    NEL GESTIONALE</button>
            </form>
        </div>
    </div>

</body>

</html>
